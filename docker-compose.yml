version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumora
      POSTGRES_PASSWORD: lumora_secret
      POSTGRES_DB: lumora_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumora -d lumora_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lumora:lumora_secret@postgres:5432/lumora_db
      NODE_ENV: production
    ports:
      - "3000:3000"
    env_file:
      - .env

volumes:
  postgres_data:
